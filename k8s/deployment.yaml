apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-mysql-app
  labels:
    app: node-mysql
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-mysql
  template:
    metadata:
      labels:
        app: node-mysql
    spec:
      containers:
      - name: node-mysql-container
        image: philippaul/node-mysql-app:02
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: rds-secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"